networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
    internal: true

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: ngemiloh_db
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      POSTGRES_USER: ngemiloh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_2024}
      POSTGRES_DB: ngemiloh_db
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      # Bind mounts for Windows compatibility - permissions work correctly
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/postgres_init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_network
    # NOTE: PostgreSQL entrypoint needs CAP_CHOWN to initialize
    # Will be dropped after initialization in production
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    # Entrypoint runs as root to set up permissions, then switches to postgres user
    # Do NOT set user: here - it breaks the entrypoint!
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngemiloh -d ngemiloh_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  # Development: No password (uses redis-entrypoint.sh)
  # Production: With password (uses redis-production-entrypoint.sh)
  redis:
    image: 'mirror.gcr.io/library/redis:7.4-alpine'
    container_name: ngemiloh_redis
    env_file:
      - path: ./docker/production.env
        required: false
    # Conditional entrypoint based on NODE_ENV
    entrypoint: >
      /bin/sh -c "
        if [ \"${NODE_ENV:-development}\" = \"production\" ]; then
          exec /docker-entrypoint-prod.sh;
        else
          exec /docker-entrypoint.sh;
        fi
      "
    volumes:
      # Bind mount for Windows compatibility
      - ./data/redis:/data
      # Development entrypoint (no password)
      - ./scripts/docker/redis-entrypoint.sh:/docker-entrypoint.sh:ro
      # Production entrypoint (with password)
      - ./scripts/docker/redis-production-entrypoint.sh:/docker-entrypoint-prod.sh:ro
    networks:
      - backend_network
    # Entrypoint runs as root to set up permissions, then switches to redis user
    # Do NOT set user: here - it breaks the entrypoint!
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-} ping || redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # NestJS Backend API
  nestjs-api:
    container_name: ngemiloh_api
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ngemiloh:dev_password_2024@postgres:5432/ngemiloh_db}
      - DIRECT_URL=${DIRECT_URL:-postgresql://ngemiloh:dev_password_2024@postgres:5432/ngemiloh_db}
      # Redis - use env var with fallback for dev
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Security Secrets (REQUIRED in production - use env vars!)
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required}
      - PIN_PEPPER_SECRET=${PIN_PEPPER_SECRET:?PIN_PEPPER_SECRET required}
      - CSRF_SECRET=${CSRF_SECRET:?CSRF_SECRET required}
      # Midtrans (sandbox keys - replace for production!)
      - MIDTRANS_SERVER_KEY_SANDBOX=${MIDTRANS_SERVER_KEY_SANDBOX:-your_sandbox_server_key_here}
      - MIDTRANS_CLIENT_KEY_SANDBOX=${MIDTRANS_CLIENT_KEY_SANDBOX:-your_sandbox_client_key_here}
      # Node env
      - NODE_ENV=${NODE_ENV:-development}
      - STORAGE_PATH=/var/storage/ngemiloh
      - JWT_ACCESS_EXPIRES=${JWT_ACCESS_EXPIRES:-8h}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - MIDTRANS_ENV=${MIDTRANS_ENV:-sandbox}
      - QRIS_EXPIRY_SECONDS=${QRIS_EXPIRY_SECONDS:-900}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_SECURE=${EMAIL_SECURE:-false}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ngemiloh.com}
      - DISCREPANCY_THRESHOLD=${DISCREPANCY_THRESHOLD:-5000}
      - PRICE_DELTA_THRESHOLD_PCT=${PRICE_DELTA_THRESHOLD_PCT:-10}
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      # Bind mount for Windows compatibility
      - ./data/storage:/var/storage/ngemiloh
    networks:
      - frontend_network
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # NOTE: Run migrations manually after containers start:
    # docker compose exec nestjs-api npx prisma migrate deploy
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/_health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Caddy Reverse Proxy
  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
    container_name: ngemiloh_caddy
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-100}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-50}
      - CADDY_ALLOWED_IPS=${CADDY_ALLOWED_IPS:-}
    volumes:
      # NOTE: Caddy data directory is required for TLS certificates
      # Using bind mount
      - ./data/caddy:/data
      - ./data/caddy_config:/config
    depends_on:
      nestjs-api:
        condition: service_healthy
    networks:
      - frontend_network
      - backend_network
    # Note: Caddy needs more permissions on Windows Docker Desktop
    # Remove security restrictions that cause "operation not permitted" errors
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pgrep caddy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
