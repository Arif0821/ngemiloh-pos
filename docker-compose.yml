version: '3.8'

networks:
  ngemiloh_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  umami_db_data:
  caddy_data:
  caddy_config:

services:
  postgres:
    image: 'mirror.gcr.io/library/postgres:16-alpine'
    container_name: ngemiloh_db
    environment:
      POSTGRES_USER: ngemiloh
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ngemiloh_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ngemiloh_net
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngemiloh -d ngemiloh_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgbouncer:
    # Menggunakan image asli dari Docker Hub karena mirror.gcr.io tidak mensupport image komunitas
    image: 'edoburu/pgbouncer:latest'
    container_name: ngemiloh_pgbouncer
    environment:
      - DATABASE_URL=postgres://ngemiloh:${DB_PASSWORD}@postgres:5432/ngemiloh_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - LISTEN_PORT=6432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ngemiloh_net
    deploy:
      resources:
        limits:
          memory: 64M
    # FIX: Tambah healthcheck agar nestjs-api tidak konek sebelum pgbouncer siap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  redis:
    image: 'mirror.gcr.io/library/redis:7-alpine'
    container_name: ngemiloh_redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ngemiloh_net
    deploy:
      resources:
        limits:
          memory: 128M
    # FIX: Tambah healthcheck untuk redis
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  nestjs-api:
    container_name: ngemiloh_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://ngemiloh:${DB_PASSWORD}@pgbouncer:6432/ngemiloh_db?schema=public&pgbouncer=true
      - DIRECT_URL=postgresql://ngemiloh:${DB_PASSWORD}@postgres:5432/ngemiloh_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-ngemiloh_super_secret_jwt_key_2026_default}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-ngemiloh_super_secret_refresh_key_2026_default}
      - PIN_PEPPER_SECRET=${PIN_PEPPER_SECRET:-ngemiloh_super_secret_pepper_2026_default}
      # FIX: Hapus NODE_ENV dari sini — sudah di-set via Coolify sebagai Runtime Only
      # Jika ingin tetap di sini, gunakan: NODE_ENV=production (tanpa fallback)
      - NODE_ENV=${NODE_ENV:-production}
      - STORAGE_PATH=/var/storage/ngemiloh
      - JWT_ACCESS_EXPIRES=8h
      - JWT_REFRESH_EXPIRES=7d
    volumes:
      - storage_data:/var/storage/ngemiloh
    networks:
      - ngemiloh_net
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        # FIX: Ganti dari service_started ke service_healthy
        # agar NestJS tidak konek sebelum pgbouncer benar-benar siap
        condition: service_healthy
      redis:
        # FIX: Ganti dari service_started ke service_healthy
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped


  caddy:
    build:
      context: .
      # FIX: Caddy.Dockerfile sudah diperbaiki — FROM mirror.gcr.io/library/caddy:2-alpine
      dockerfile: Caddy.Dockerfile
    container_name: ngemiloh_caddy
    ports:
      - "80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ngemiloh_net
    depends_on:
      nestjs-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  umami-db:
    image: 'mirror.gcr.io/library/postgres:15-alpine'
    container_name: ngemiloh_umami_db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_secret_2026}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks:
      - ngemiloh_net
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: ngemiloh_umami
    ports:
      - "3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_secret_2026}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-umami_secret_key_2026}
    depends_on:
      - umami-db
    networks:
      - ngemiloh_net
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
