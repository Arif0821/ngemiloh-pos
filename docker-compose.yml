version: '3.8'

volumes:
  postgres_data:
  redis_data:
  storage_data:
  caddy_data:
  caddy_config:

services:
  # ============================================================
  # Database: PostgreSQL 16
  # ============================================================
  postgres:
    image: 'mirror.gcr.io/library/postgres:16-alpine'
    container_name: ngemiloh_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ngemiloh
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ngemiloh_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      # CI/CD: Use postgres superuser for healthcheck (more reliable)
      test: ["CMD-SHELL", "pg_isready -U ngemiloh -d ngemiloh_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # Redis: Cache& Queue
  # ============================================================
  redis:
    image: 'mirror.gcr.io/library/redis:7-alpine'
    container_name: ngemiloh_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # NestJS Backend API
  # ============================================================
  nestjs-api:
    container_name: ngemiloh_api
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
        - ALPINE_VERSION=3.18
    environment:
      # Direct connection to postgres (no pgbouncer for simplicity)
      - DATABASE_URL=postgresql://ngemiloh:${DB_PASSWORD}@postgres:5432/ngemiloh_db
      - DIRECT_URL=postgresql://ngemiloh:${DB_PASSWORD}@postgres:5432/ngemiloh_db
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - PIN_PEPPER_SECRET=${PIN_PEPPER_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - STORAGE_PATH=/var/storage/ngemiloh
      - JWT_ACCESS_EXPIRES=8h
      - FRONTEND_URL=${FRONTEND_URL:-https://pos.yourdomain.com}
      - MIDTRANS_ENV=${MIDTRANS_ENV:-sandbox}
      - MIDTRANS_SERVER_KEY_SANDBOX=${MIDTRANS_SERVER_KEY_SANDBOX}
      - MIDTRANS_SERVER_KEY_PRODUCTION=${MIDTRANS_SERVER_KEY_PRODUCTION}
      - MIDTRANS_CLIENT_KEY_SANDBOX=${MIDTRANS_CLIENT_KEY_SANDBOX}
      - MIDTRANS_CLIENT_KEY_PRODUCTION=${MIDTRANS_CLIENT_KEY_PRODUCTION}
      - QRIS_EXPIRY_SECONDS=${QRIS_EXPIRY_SECONDS:-900}
      # FIX: Add missing email environment variables
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_SECURE=${EMAIL_SECURE:-false}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ngemiloh.com}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}
      - EMAIL_ALERT_TO=${EMAIL_ALERT_TO}
      - CSRF_SECRET=${CSRF_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
      - DISCREPANCY_THRESHOLD=${DISCREPANCY_THRESHOLD:-5000}
      - PRICE_DELTA_THRESHOLD_PCT=${PRICE_DELTA_THRESHOLD_PCT:-10}
      - TZ=${TZ:-Asia/Jakarta}
      # Force Prisma to use OpenSSL 3.0.x binary (Alpine's default OpenSSL detection fails)
      - PRISMA_CLIENT_FORCE_LIBQUERY_ENGINE_BINARY=/app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
    volumes:
      - storage_data:/var/storage/ngemiloh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy  # FIX: Wait for Redis to be healthy before starting
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      # CI/CD: Use curl instead of wget (Alpine doesn't have wget by default)
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ============================================================
  # Caddy: Reverse Proxy + Static Files
  # ============================================================
  caddy:
    build:
      context: .
      dockerfile: Caddy.Dockerfile
      args:
        - NODE_ENV=development
    container_name: ngemiloh_caddy
    ports:
      - "80"
      - "443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nestjs-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      # CI/CD: Use curl instead of wget (Alpine doesn't have wget by default)
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

