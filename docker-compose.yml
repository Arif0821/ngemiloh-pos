networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
    internal: true

volumes:
  # Named volumes for data safety (Windows + Linux compatible)
  postgres_data:
    name: ngemiloh_postgres_data
  redis_data:
    name: ngemiloh_redis_data
  caddy_data:
    name: ngemiloh_caddy_data
  caddy_config:
    name: ngemiloh_caddy_config
  storage_data:
    name: ngemiloh_storage_data
  backup_data:
    name: ngemiloh_backup_data

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: ngemiloh_db
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      POSTGRES_USER: ngemiloh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_2024}
      POSTGRES_DB: ngemiloh_db
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      # Named volumes for data safety
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres_init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_network
    # NOTE: PostgreSQL entrypoint needs CAP_CHOWN to initialize
    # Will be dropped after initialization in production
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    # Entrypoint runs as root to set up permissions, then switches to postgres user
    # Do NOT set user: here - it breaks the entrypoint!
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngemiloh -d ngemiloh_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  # Development: No password (uses redis-entrypoint.sh)
  # Production: With password (uses redis-production-entrypoint.sh)
  redis:
    image: 'mirror.gcr.io/library/redis:7.4-alpine'
    container_name: ngemiloh_redis
    env_file:
      - path: ./docker/production.env
        required: false
    # Conditional entrypoint based on NODE_ENV
    entrypoint: >
      /bin/sh -c "
        if [ \"${NODE_ENV:-development}\" = \"production\" ]; then
          exec /docker-entrypoint-prod.sh;
        else
          exec /docker-entrypoint.sh;
        fi
      "
    volumes:
      # Named volumes for data safety
      - redis_data:/data
      # Development entrypoint (no password)
      - ./scripts/docker/redis-entrypoint.sh:/docker-entrypoint.sh:ro
      # Production entrypoint (with password)
      - ./scripts/docker/redis-production-entrypoint.sh:/docker-entrypoint-prod.sh:ro
    networks:
      - backend_network
    # Entrypoint runs as root to set up permissions, then switches to redis user
    # Do NOT set user: here - it breaks the entrypoint!
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "(redis-cli -a ${REDIS_PASSWORD:-} ping 2>/dev/null || redis-cli ping) && (redis-cli -a ${REDIS_PASSWORD:-} INFO persistence 2>/dev/null || redis-cli INFO persistence) | grep -qE 'rdb_last_bgsave_status:ok|aof_last_write_status:ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # NestJS Backend API
  nestjs-api:
    container_name: ngemiloh_api
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://ngemiloh:dev_password_2024@postgres:5432/ngemiloh_db}
      - DIRECT_URL=${DIRECT_URL:-postgresql://ngemiloh:dev_password_2024@postgres:5432/ngemiloh_db}
      # Redis - use env var with fallback for dev
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Security Secrets (REQUIRED in production - use env vars!)
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required}
      - PIN_PEPPER_SECRET=${PIN_PEPPER_SECRET:?PIN_PEPPER_SECRET required}
      - CSRF_SECRET=${CSRF_SECRET:?CSRF_SECRET required}
      # Midtrans (sandbox keys - replace for production!)
      - MIDTRANS_SERVER_KEY_SANDBOX=${MIDTRANS_SERVER_KEY_SANDBOX:-your_sandbox_server_key_here}
      - MIDTRANS_CLIENT_KEY_SANDBOX=${MIDTRANS_CLIENT_KEY_SANDBOX:-your_sandbox_client_key_here}
      # Node env
      - NODE_ENV=${NODE_ENV:-development}
      - STORAGE_PATH=/var/storage/ngemiloh
      - JWT_ACCESS_EXPIRES=${JWT_ACCESS_EXPIRES:-8h}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - MIDTRANS_ENV=${MIDTRANS_ENV:-sandbox}
      - QRIS_EXPIRY_SECONDS=${QRIS_EXPIRY_SECONDS:-900}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_SECURE=${EMAIL_SECURE:-false}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ngemiloh.com}
      - DISCREPANCY_THRESHOLD=${DISCREPANCY_THRESHOLD:-5000}
      - PRICE_DELTA_THRESHOLD_PCT=${PRICE_DELTA_THRESHOLD_PCT:-10}
      - TZ=${TZ:-Asia/Jakarta}
      # Backup settings
      - BACKUP_DIR=${BACKUP_DIR:-/var/backups/ngemiloh}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      # Named volumes for data safety
      - storage_data:/var/storage/ngemiloh
      # Backup script
      - ./scripts/docker/schedule-backup.sh:/scripts/schedule-backup.sh:ro
    networks:
      - frontend_network
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # NOTE: Run migrations manually after containers start:
    # docker compose exec nestjs-api npx prisma migrate deploy
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/_health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Caddy Reverse Proxy
  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
    container_name: ngemiloh_caddy
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-100}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-50}
      - CADDY_ALLOWED_IPS=${CADDY_ALLOWED_IPS:-}
    volumes:
      # Named volumes for data safety
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nestjs-api:
        condition: service_healthy
    networks:
      - frontend_network
      - backend_network
    # Note: Caddy needs more permissions on Windows Docker Desktop
    # Remove security restrictions that cause "operation not permitted" errors
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pgrep caddy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ===========================================
  # Backup Service (Cron-based)
  # Runs at 02:00 WIB daily
  # ===========================================
  backup:
    image: postgres:17-alpine
    container_name: ngemiloh_backup
    env_file:
      - path: ./docker/production.env
        required: false
      - path: ./docker/backup.env
        required: false
    environment:
      # Database connection
      - DB_NAME=${DB_NAME:-ngemiloh_db}
      - DB_USER=${DB_USER:-ngemiloh}
      - DB_PASSWORD=${DB_PASSWORD:-dev_password_2024}
      # Backup settings
      - BACKUP_DIR=${BACKUP_DIR:-/var/backups/ngemiloh}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
      # Optional alerts
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - BACKUP_WEBHOOK_URL=${BACKUP_WEBHOOK_URL:-}
      # Optional cloud upload
      - BACKUP_RCLONE_REMOTE=${BACKUP_RCLONE_REMOTE:-}
      # Timezone
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      # Named volume for backups
      - backup_data:/var/backups/ngemiloh
      # Backup scripts
      - ./scripts/docker/schedule-backup.sh:/scripts/schedule-backup.sh:ro
    networks:
      - backend_network
    # Cron scheduler (use dockertectonics/cron or similar)
    # Alternative: Use NestJS built-in scheduler
    entrypoint: >
      /bin/sh -c "
        echo 'Starting backup cron service...';
        echo 'Backup will run daily at 02:00 WIB';
        echo 'Manual backup: docker compose exec backup /scripts/schedule-backup.sh';
        # Run crond in foreground
        crond -f -l 2
      "
    command: >
      /bin/sh -c "
        # Set up cron schedule: 02:00 WIB daily
        echo '0 2 * * * /scripts/schedule-backup.sh >> /var/backups/ngemiloh/backup.log 2>&1' > /etc/crontabs/root;
        echo '30 2 * * * find /var/backups/ngemiloh -name \"*.gz\" -mtime +30 -delete >> /var/backups/ngemiloh/backup.log 2>&1' >> /etc/crontabs/root;
        echo '00 3 * * 0 /scripts/backup-config.sh >> /var/backups/ngemiloh/config-backup.log 2>&1' >> /etc/crontabs/root;
        crond;
        tail -f /dev/null
      "
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 32M
    restart: unless-stopped
    # Only run when postgres is healthy
    depends_on:
      postgres:
        condition: service_healthy

  # ===========================================
  # Cron Service (Shared for all scheduled tasks)
  # Alternative: NestJS built-in @nestjs/schedule
  # ===========================================
  cron:
    image: alpine:3.19
    container_name: ngemiloh_cron
    env_file:
      - path: ./docker/production.env
        required: false
    environment:
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      # Mount docker socket for health checks
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Backup scripts
      - ./scripts/docker/schedule-backup.sh:/scripts/schedule-backup.sh:ro
      - ./scripts/backup-config.sh:/scripts/backup-config.sh:ro
      # Backup volume
      - backup_data:/var/backups/ngemiloh
    command: >
      /bin/sh -c "
        apk add --no-cache dcron postgresql-client bash gzip openssl coreutils;
        # Set up cron schedule
        echo '0 2 * * * /scripts/schedule-backup.sh >> /var/backups/ngemiloh/backup.log 2>&1' > /var/spool/cron/crontabs/root;
        echo '0 3 * * * /scripts/backup-config.sh >> /var/backups/ngemiloh/config-backup.log 2>&1' >> /var/spool/cron/crontabs/root;
        echo '';
        echo 'Scheduled Jobs:';
        echo '  - Database backup: Daily at 02:00 WIB';
        echo '  - Config backup: Daily at 03:00 WIB';
        echo '';
        crond -f -l 2
      "
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
