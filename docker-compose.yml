version: '3.8'

volumes:
  postgres_data:
  redis_data:
  storage_data:
  umami_db_data:
  caddy_data:
  caddy_config:
  pgbouncer_data:

services:
  # ============================================================
  # Database: PostgreSQL 16
  # ============================================================
  postgres:
    image: 'mirror.gcr.io/library/postgres:16-alpine'
    container_name: ngemiloh_db
    environment:
      POSTGRES_USER: ngemiloh
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ngemiloh_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngemiloh -d ngemiloh_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # PgBouncer: Connection pooler (transaction mode)
  # ============================================================
  pgbouncer:
    image: ghcr.io/bitnami/postgresql-pgbouncer:1.31
    container_name: ngemiloh_pgbouncer
    environment:
      # Bitnami pgbouncer uses these env vars
      PGBOUNCER_AUTH_TYPE: "md5"
      PGBOUNCER_AUTH_QUERY: "SELECT usename, passwd FROM pg_shadow WHERE usename = $1"
      PGBOUNCER_POOL_MODE: "transaction"
      PGBOUNCER_MAX_CLIENT_CONN: "100"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "3"
      PGBOUNCER_SERVER_LIFETIME: "3600"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_SERVER_RESET_ON_RELEASE: "on"
      # Database connection - parsed by the entrypoint
      POSTGRESQL_HOST: "postgres"
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_USERNAME: "ngemiloh"
      POSTGRESQL_PASSWORD: "${DB_PASSWORD}"
      POSTGRESQL_DATABASE: "ngemiloh_db"
    volumes:
      - pgbouncer_data:/var/log/pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ngemiloh || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Redis: Cache & Queue
  # ============================================================
  redis:
    image: 'mirror.gcr.io/library/redis:7-alpine'
    container_name: ngemiloh_redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ============================================================
  # NestJS Backend API
  # ============================================================
  nestjs-api:
    container_name: ngemiloh_api
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    environment:
      - DATABASE_URL=postgresql://ngemiloh:${DB_PASSWORD}@pgbouncer:6432/ngemiloh_db
      - DIRECT_URL=postgresql://ngemiloh:${DB_PASSWORD}@postgres:5432/ngemiloh_db
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PIN_PEPPER_SECRET=${PIN_PEPPER_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - STORAGE_PATH=/var/storage/ngemiloh
      - JWT_ACCESS_EXPIRES=8h
      - JWT_REFRESH_EXPIRES=7d
      - FRONTEND_URL=${FRONTEND_URL:-https://pos.yourdomain.com}
      - MIDTRANS_ENV=${MIDTRANS_ENV:-sandbox}
      - MIDTRANS_SERVER_KEY_SANDBOX=${MIDTRANS_SERVER_KEY_SANDBOX}
      - MIDTRANS_SERVER_KEY_PRODUCTION=${MIDTRANS_SERVER_KEY_PRODUCTION}
      - MIDTRANS_CLIENT_KEY_SANDBOX=${MIDTRANS_CLIENT_KEY_SANDBOX}
      - MIDTRANS_CLIENT_KEY_PRODUCTION=${MIDTRANS_CLIENT_KEY_PRODUCTION}
      - QRIS_EXPIRY_SECONDS=${QRIS_EXPIRY_SECONDS:-900}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}
      - EMAIL_ALERT_TO=${EMAIL_ALERT_TO}
      - SENTRY_DSN=${SENTRY_DSN}
      - DISCREPANCY_THRESHOLD=${DISCREPANCY_THRESHOLD:-5000}
      - PRICE_DELTA_THRESHOLD_PCT=${PRICE_DELTA_THRESHOLD_PCT:-10}
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      - storage_data:/var/storage/ngemiloh
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ============================================================
  # Caddy: Reverse Proxy + Static Files
  # ============================================================
  caddy:
    build:
      context: .
      dockerfile: Caddy.Dockerfile
      args:
        - NODE_ENV=development
    container_name: ngemiloh_caddy
    ports:
      - "80"
      - "443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nestjs-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ============================================================
  # Umami Analytics - Database
  # ============================================================
  umami-db:
    image: 'mirror.gcr.io/library/postgres:15-alpine'
    container_name: ngemiloh_umami_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_secret_2026}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      timeout: 5s
      interval: 5s
      retries: 10
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # Umami Analytics - App
  # ============================================================
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: ngemiloh_umami
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_secret_2026}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-umami_secret_key_2026}
    depends_on:
      umami-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped