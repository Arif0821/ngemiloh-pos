name: CI Pipeline

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # JOB 1: LINT
  # ============================================
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ============================================
  # JOB 2: TYPE CHECK
  # ============================================
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DIRECT_URL: "postgresql://postgres:test@localhost:5432/ngemiloh_test"

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  # ============================================
  # JOB 3: TEST
  # ============================================
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ngemiloh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:test@localhost:5432/ngemiloh_test"
          DIRECT_URL: "postgresql://postgres:test@localhost:5432/ngemiloh_test"

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 1
          done
          exit 1

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov
        env:
          DATABASE_URL: "postgresql://postgres:test@localhost:5432/ngemiloh_test"
          DIRECT_URL: "postgresql://postgres:test@localhost:5432/ngemiloh_test"
          REDIS_URL: "redis://localhost:6379"
          JWT_ACCESS_SECRET: "test-secret"
          JWT_REFRESH_SECRET: "test-refresh-secret"
          JWT_ACCESS_EXPIRES: "1h"
          JWT_REFRESH_EXPIRES: "7d"
          PIN_PEPPER_SECRET: "test-pepper"
          NODE_ENV: "test"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: unittests
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./backend/coverage/

  # ============================================
  # JOB 4: SECURITY AUDIT
  # ============================================
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          if grep -r -i "password.*=.*['\"][^'\"]*['\"]" --include="*.ts" src/ 2>/dev/null; then
            echo "WARNING: Potential hardcoded passwords found!"
          fi

  # ============================================
  # JOB 5: FRONTEND LINT
  # ============================================
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Prettier
        run: npm run format -- --check
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ============================================
  # JOB 6: FRONTEND TYPE CHECK
  # ============================================
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Sync SvelteKit types
        run: npx svelte-kit sync

      - name: Run Svelte-Check
        run: npm run check

  # ============================================
  # JOB 7: FRONTEND TEST
  # ============================================
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --run --coverage
        continue-on-error: true

  # ============================================
  # JOB 8: BUILD
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, frontend-lint, frontend-typecheck, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ngemiloh-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/ngemiloh-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

      - name: Push backend image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ngemiloh-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Caddy (frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Caddy.Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ngemiloh-caddy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
